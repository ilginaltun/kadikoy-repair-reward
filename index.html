<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadıköy Tamir & Ödül v4.0</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --background: #fcf7f5;
      --foreground: #000000;
      --border: #000000;
      --shadow: 8px 8px 0px 0px var(--border);
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: 'Poppins', sans-serif;
      background-image: linear-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .brutal-card {
      background: #ffffff;
      border: 5px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.1s ease;
    }

    .brutal-btn {
      border: 4px solid #000;
      box-shadow: 6px 6px 0px 0px #000;
      transition: all 0.1s ease;
      cursor: pointer;
    }

    .brutal-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px #000;
    }

    .sticker-drop { filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 1)); }
    .custom-marker { border: 3px solid #000; box-shadow: 3px 3px 0px #000; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <script>
    tailwind.config = { 
      theme: { extend: { colors: { brandYellow: '#dcfc75', brandPink: '#e1d2f3', brandBlue: '#054ff0', mainBg: '#fcf7f5' } } } 
    }
  </script>
</head>

<body class="p-4 md:p-10 min-h-screen">
  <div id="root"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.6';
    import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.19.6/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    const IconHome = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
    const IconMap = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>`;
    const IconSearch = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;

    function ChatBot({ isChatOpen, setIsChatOpen, messages, input, setInput, handleSend }) {
      return html`
        <div class="fixed bottom-10 right-5 md:right-10 z-[9999]">
          ${isChatOpen && html`
            <div class="w-[90vw] md:w-[400px] h-[500px] brutal-card flex flex-col mb-6 overflow-hidden bg-white max-w-sm">
              <div class="bg-black text-brandYellow p-5 font-black uppercase flex justify-between items-center border-b-4 border-black">
                <span>TAMİR AI</span>
                <button onClick=${() => setIsChatOpen(false)} class="text-2xl text-white">×</button>
              </div>
              <div class="flex-grow p-4 overflow-y-auto space-y-4">
                ${messages.map(m => html`<div class="p-3 border-4 border-black font-bold ${m.role === 'bot' ? 'bg-brandYellow' : 'bg-white shadow-[4px_4px_0px_#000]'}">${m.text}</div>`)}
              </div>
              <div class="p-4 border-t-4 border-black flex gap-2">
                <input value=${input} onInput=${e => setInput(e.target.value)} class="flex-grow p-2 border-4 border-black outline-none font-bold" />
                <button onClick=${handleSend} class="bg-black text-white px-4 border-4 border-black font-black">SOR</button>
              </div>
            </div>
          `}
          <button onClick=${() => setIsChatOpen(!isChatOpen)} class="bg-brandBlue text-white w-20 h-20 brutal-card flex items-center justify-center text-4xl font-black shadow-[10px_10px_0px_#000]">?</button>
        </div>
      `;
    }

    function MapView() {
      const mapRef = useRef(null);
      const mapInstance = useRef(null);
      const [layers, setLayers] = useState({
        tamirciler: { active: true, title: 'TAMİRCİLER', color: 'bg-brandYellow' },
        kamu: { active: true, title: 'KAMU BİNALARI', color: 'bg-brandPink' }
      });
      const groupsRef = useRef({ tamirciler: null, kamu: null });

      useEffect(() => {
        if (!mapRef.current) return;
        mapInstance.current = window.L.map(mapRef.current).setView([40.988, 29.045], 14);
        window.L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(mapInstance.current);
        
        groupsRef.current.tamirciler = window.L.layerGroup().addTo(mapInstance.current);
        groupsRef.current.kamu = window.L.layerGroup().addTo(mapInstance.current);

        fetch('./kadikoy_map_data.json').then(res => res.json()).then(data => {
          const createIcon = (color) => window.L.divIcon({ className: `custom-marker ${color} w-6 h-6`, iconSize: [24, 24] });
          if (data.tamirciler) {
            Object.entries(data.tamirciler).forEach(([cat, shops]) => {
              shops.forEach(s => {
                window.L.marker([s.lat, s.lon], { icon: createIcon('bg-brandYellow') })
                  .bindPopup(`<b class="uppercase font-black">${s.name}</b><br/><span class="text-xs uppercase font-bold">${cat}</span>`).addTo(groupsRef.current.tamirciler);
              });
            });
          }
          data.kamu?.forEach(k => {
            window.L.marker([k.lat, k.lon], { icon: createIcon('bg-brandPink') }).bindPopup(`<b class="uppercase font-black">${k.name}</b>`).addTo(groupsRef.current.kamu);
          });
        }).catch(err => console.error("Harita verisi yuklenemedi:", err));

        return () => mapInstance.current.remove();
      }, []);

      useEffect(() => {
        if (!mapInstance.current) return;
        layers.tamirciler.active ? mapInstance.current.addLayer(groupsRef.current.tamirciler) : mapInstance.current.removeLayer(groupsRef.current.tamirciler);
        layers.kamu.active ? mapInstance.current.addLayer(groupsRef.current.kamu) : mapInstance.current.removeLayer(groupsRef.current.kamu);
      }, [layers]);

      return html`
        <div class="flex flex-col lg:flex-row gap-8 relative z-10">
          <div class="w-full lg:w-[350px] brutal-card p-8 bg-white h-fit">
            <h3 class="text-3xl font-black uppercase border-b-4 border-black pb-4 mb-8 italic">KATMANLAR</h3>
            <div class="space-y-6">
               ${Object.entries(layers).map(([key, l]) => html`
                 <div class="flex items-center gap-6 cursor-pointer group" onClick=${() => setLayers(p => ({...p, [key]: {...l, active: !l.active}}))}>
                   <div class="w-10 h-10 border-4 border-black shadow-[3px_3px_0px_#000] ${l.active ? l.color : 'bg-gray-200'}"></div>
                   <span class="text-2xl font-black uppercase tracking-tighter">${l.title}</span>
                 </div>
               `)}
            </div>
          </div>
          <div ref=${mapRef} class="w-full h-[600px] brutal-card overflow-hidden"></div>
        </div>
      `;
    }

    function App() {
      const [auth, setAuth] = useState({ loggedIn: false, role: null });
      const [view, setView] = useState('panel');
      const [puan, setPuan] = useState(250);
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [messages, setMessages] = useState([{ role: 'bot', text: 'Merhaba! Bugün neyi tamir ediyoruz?' }]);
      const [chatInput, setChatInput] = useState('');

      const tamirciIsleri = [
        { id: 1, baslik: 'Kırık Ekran', kategori: 'Elektronik', musteri: 'Ahmet Y.', konum: 'Moda Sahil', aciliyet: 'Yüksek', ucret: '500 Puan', img: 'telefon.png' },
        { id: 2, baslik: 'Fermuar Değişimi', kategori: 'Tekstil', musteri: 'Zeynep K.', konum: 'Yeldeğirmeni', aciliyet: 'Orta', ucret: '150 Puan', img: 'dikiş makinesi.png' },
        { id: 3, baslik: 'Vites Ayarı', kategori: 'Bisiklet', musteri: 'Can B.', konum: 'Osmanağa', aciliyet: 'Düşük', ucret: '200 Puan', img: 'bisiklet.png' }
      ];

      const sonTamirlerData = [
        { id: 1, isim: 'TOST MAKİNESİ', konum: 'Moda Merkezi', tarih: '2026-03-25', puan: 50, bg: 'bg-mainBg' },
        { id: 2, isim: 'SANDALYE', konum: 'Yeldeğirmeni Merkezi', tarih: '2026-03-12', puan: 150, bg: 'bg-brandPink' },
        { id: 3, isim: 'BİSİKLET FRENİ', konum: 'Moda Sahili', tarih: '2026-02-18', puan: 80, bg: 'bg-mainBg' }
      ];

      useEffect(() => {
        if (auth.loggedIn && auth.role === 'musteri' && view === 'panel') {
          setTimeout(() => {
            const canvas = document.getElementById('user-qr-code');
            if (canvas) window.QRCode.toCanvas(canvas, "TAMIR-2026-ILGIN", { width: 220, margin: 1 });
          }, 200);
        }
      }, [view, auth]);

      const handleSend = () => {
        if (!chatInput.trim()) return;
        setMessages([...messages, { role: 'user', text: chatInput }]);
        setChatInput('');
      };

      if (!auth.loggedIn) {
        return html`
          <div class="min-h-screen flex flex-col items-center justify-center p-4">
             <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter text-center mb-12">TAMİR<br/><span class="text-brandBlue">&</span> ÖDÜL</h1>
             <div class="brutal-card p-10 bg-white max-w-md w-full text-center space-y-6">
                <button onClick=${() => setAuth({loggedIn: true, role: 'musteri'})} class="w-full brutal-btn bg-brandPink p-6 font-black text-2xl uppercase group">MÜŞTERİ <span class="group-hover:scale-125 transition-transform">🙋🏻‍♀️</span></button>
                <button onClick=${() => setAuth({loggedIn: true, role: 'tamirci'})} class="w-full brutal-btn bg-brandBlue text-white p-6 font-black text-2xl uppercase group">TAMİRCİ <span class="group-hover:scale-125 transition-transform">🔧</span></button>
             </div>
          </div>
        `;
      }

      if (auth.role === 'tamirci') {
        return html`
          <div class="max-w-7xl mx-auto space-y-12">
            <header class="flex justify-between items-center border-b-8 border-black pb-8 mt-4">
              <h1 class="text-6xl font-black uppercase leading-[0.8]">USTA<br/><span class="text-brandBlue">PANELİ</span></h1>
              <button onClick=${() => setAuth({loggedIn: false, role: null})} class="bg-white border-4 border-black px-6 py-3 font-black uppercase text-xl brutal-btn">ÇIKIŞ</button>
            </header>
            <main class="space-y-10">
              <h2 class="inline-block bg-black text-white px-6 py-3 text-3xl font-black uppercase border-4 border-black">YAKINDAKİ İŞLER</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                ${tamirciIsleri.map(is => html`
                  <div class="brutal-card p-8 flex flex-col bg-white border-[5px]">
                    <div class="flex justify-between mb-8">
                      <span class="bg-brandPink border-2 border-black px-4 py-1 font-black text-xs uppercase">${is.kategori}</span>
                      <span class="bg-mainBg border-2 border-black px-2 py-1 font-bold text-[10px] uppercase">${is.konum}</span>
                    </div>
                    <div class="flex flex-row items-center mb-8 gap-4 border-b-4 border-black pb-6">
                      <img src="${is.img}" class="w-32 h-32 object-contain sticker-drop shrink-0" />
                      <h3 class="text-2xl md:text-3xl font-black uppercase leading-tight">${is.baslik}</h3>
                    </div>
                    <p class="font-bold mb-6 uppercase text-sm">Müşteri: ${is.musteri}</p>
                    <div class="mt-auto space-y-4">
                      <div class="flex justify-between items-center bg-brandYellow border-4 border-black p-4">
                        <span class="font-black text-2xl text-brandBlue italic">${is.ucret}</span>
                        <span class="font-black uppercase text-xs ${is.aciliyet === 'Yüksek' ? 'text-red-600 animate-pulse' : ''}">${is.aciliyet} ACİL</span>
                      </div>
                      <button class="w-full bg-black text-white border-4 border-black p-4 font-black text-xl uppercase brutal-btn">İŞİ AL</button>
                    </div>
                  </div>
                `)}
              </div>
            </main>
          </div>
        `;
      }

      return html`
        <div class="max-w-7xl mx-auto space-y-12">
          <header class="flex flex-col gap-8 border-b-8 border-black pb-8 mt-4">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-6">
              <h1 class="text-7xl font-black uppercase text-black leading-[0.8] italic">MÜŞTERİ<br/>PANELİ</h1>
              <div class="bg-brandYellow border-4 border-black shadow-[8px_8px_0px_0px_#000] p-8 transform rotate-1 -skew-x-6 w-full md:max-w-2xl">
                <p class="text-3xl md:text-5xl font-black uppercase leading-tight whitespace-nowrap">TAMİRİ YAP <br class="md:hidden" /> İNDİRİMİ KAP!</p>
              </div>
            </div>
            <nav class="flex flex-wrap gap-4 justify-start md:justify-end">
              <button onClick=${() => setView('panel')} class="px-8 py-4 brutal-btn font-black text-xl uppercase ${view === 'panel' ? 'bg-black text-white' : 'bg-white'}"><${IconHome} /> PANEL</button>
              <button onClick=${() => setView('ustalar')} class="px-8 py-4 brutal-btn font-black text-xl uppercase ${view === 'ustalar' ? 'bg-black text-white' : 'bg-brandYellow'}"><${IconSearch} /> USTA BUL</button>
              <button onClick=${() => setView('merkezler')} class="px-8 py-4 brutal-btn font-black text-xl uppercase ${view === 'merkezler' ? 'bg-black text-white' : 'bg-white'}"><${IconMap} /> HARİTA</button>
              <button onClick=${() => setAuth({loggedIn: false, role: null})} class="px-8 py-4 brutal-btn font-black text-xl uppercase bg-white text-red-600">ÇIKIŞ</button>
            </nav>
          </header>

          <main>
            ${view === 'panel' && html`
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="space-y-8">
                  <div class="brutal-card p-10 bg-brandBlue text-white text-center flex flex-col justify-center border-[6px]">
                    <h2 class="text-4xl font-black uppercase mb-4 tracking-tighter">PUANIN</h2>
                    <div class="text-[8rem] md:text-[10rem] font-black leading-none italic">${puan}</div>
                  </div>
                  <div class="brutal-card p-10 bg-white flex flex-col items-center justify-center border-[6px]">
                     <div class="bg-white border-4 border-black p-4 mb-6 shadow-[6px_6px_0px_#000]"><canvas id="user-qr-code"></canvas></div>
                     <p class="bg-black text-white px-6 py-3 font-black text-xl md:text-2xl uppercase shadow-[6px_6px_0px_#dcfc75]">TAMIR-2026-ILGIN</p>
                  </div>
                </div>
                <div class="brutal-card p-10 bg-white space-y-8 flex flex-col border-[6px]">
                  <div class="bg-brandYellow border-4 border-black px-6 py-3 font-black text-3xl uppercase inline-block italic shadow-[4px_4px_0px_#000]">🔧 SON TAMİRLER</div>
                  <div class="flex-grow space-y-6">
                    ${sonTamirlerData.map(item => html`
                      <div class="border-4 border-black p-5 flex justify-between items-center ${item.bg} shadow-[4px_4px_0px_#000]">
                        <div><h4 class="text-2xl font-black uppercase text-black leading-tight">${item.isim}</h4><span class="text-sm font-bold opacity-60 uppercase text-black">${item.konum} • ${item.tarih}</span></div>
                        <div class="bg-brandYellow border-4 border-black px-4 py-2 font-black text-2xl text-black">+${item.puan}</div>
                      </div>
                    `)}
                  </div>
                </div>
              </div>
            `}
            ${view === 'ustalar' && html`<div class="max-w-4xl mx-auto brutal-card p-10 bg-white border-[6px] text-center space-y-8"><h2 class="text-5xl font-black uppercase">USTANLA EŞLEŞ</h2><button onClick=${handleSend} class="w-full bg-brandYellow border-4 border-black p-6 font-black text-3xl uppercase brutal-btn">EN YAKIN USTAYI BUL</button></div>`}
            ${view === 'merkezler' && html`<${MapView} />`}
          </main>
          <${ChatBot} isChatOpen=${isChatOpen} setIsChatOpen=${setIsChatOpen} messages=${messages} input=${chatInput} setInput=${setChatInput} handleSend=${handleSend} />
        </div>
      `;
    }

    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
