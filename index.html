<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadıköy Tamir & Ödül v4.0 - Usta Eşleşme</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --background: #fcf7f5;
      --secondary-background: #ffffff;
      --foreground: #000000;
      --border: #000000;
      --shadow: 8px 8px 0px 0px var(--border);
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: 'Poppins', sans-serif;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      overflow-x: hidden;
    }

    .brutal-card {
      background: var(--secondary-background);
      border: 4px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.1s ease;
    }

    .brutal-btn {
      border: 4px solid #000;
      box-shadow: 6px 6px 0px 0px #000;
      transition: all 0.1s ease;
    }

    .brutal-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px #000;
    }

    .leaflet-container {
      border: 4px solid #000 !important;
      background: #fff !important;
    }

    .map-checkbox {
      appearance: none;
      background: #fff;
      width: 2.2rem;
      height: 2.2rem;
      border: 4px solid #000;
      display: grid;
      place-content: center;
      cursor: pointer;
    }

    .map-checkbox:checked::before {
      content: "";
      width: 1.2rem;
      height: 1.2rem;
      background: #000;
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .nav-scroll { overflow-x: auto; scrollbar-width: thin; scrollbar-color: #000 #fcf7f5; }
    .nav-scroll::-webkit-scrollbar { height: 5px; }
    .nav-scroll::-webkit-scrollbar-track { background: #fcf7f5; border: 2px solid #000; }
    .nav-scroll::-webkit-scrollbar-thumb { background: #000; }

    .sticker-drop {
      filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 1));
    }

    @keyframes pulse-marker {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0px #054ff0; }
      50% { transform: scale(1.5); box-shadow: 0 0 25px #054ff0; }
    }
    .pulse-marker {
      animation: pulse-marker 1.2s ease-in-out infinite;
      border-radius: 0;
    }

    @keyframes impact-pop {
      0% { transform: scale(0.85) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .impact-pop { animation: impact-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandYellow: '#dcfc75',
            brandPink: '#e1d2f3',
            brandBlue: '#054ff0',
            mainBg: '#fcf7f5'
          }
        }
      }
    }
  </script>
</head>

<body class="p-4 md:p-10 relative min-h-screen">
  <div id="root"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.6';
    import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.19.6/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    // ── Icons ──────────────────────────────────────────────────────────────
    const IconHome    = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
    const IconGift    = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>`;
    const IconMap     = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>`;
    const IconWrench  = () => html`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`;
    const IconSearch  = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
    const IconBox     = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;
    const IconLeaf    = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>`;

    // ── Helpers ────────────────────────────────────────────────────────────
    const getDistance = (lat1, lon1, lat2, lon2) => {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    };

    const getCategoryEmoji = (cat) =>
      ({ 'Elektronik': '📱', 'Tekstil': '👗', 'Mobilya': '🪑', 'Bisiklet': '🚲', 'Diğer': '📦' })[cat] ?? '📦';

    // Per-item environmental impact (based on Kadıköy waste calculations, hesap.pdf)
    // E-atık + tekstil üretim+bertaraf fazı emisyon faktörleri kullanılmıştır.
    const calcImpact = (category, amount = 1) => {
      const f = {
        'Elektronik': { co2: 70,  water: 13000 },
        'Tekstil':    { co2: 15,  water: 1500  },
        'Mobilya':    { co2: 30,  water: 200   },
        'Bisiklet':   { co2: 90,  water: 450   },
        'Diğer':      { co2: 40,  water: 300   },
      }[category] ?? { co2: 40, water: 300 };
      const co2   = Math.round(f.co2 * amount);
      const water = Math.round(f.water * amount);
      const trees = Math.max(1, Math.round(co2 / 21)); // 1 ağaç ≈ 21 kg CO₂/yıl
      const points = Math.max(10, co2);
      return { co2, water, trees, points };
    };

    function renderMessageWithShops(text, allShops, onShopClick) {
      if (!allShops.length) return text;
      const entries = [];
      for (const shop of allShops) {
        entries.push({ term: shop.name, shop });
        const m = shop.name.match(/\(([^)]+)\)/);
        if (m) entries.push({ term: m[1], shop });
      }
      entries.sort((a, b) => b.term.length - a.term.length);
      let segments = [{ type: 'text', value: text }];
      for (const { term, shop } of entries) {
        const newSegments = [];
        for (const seg of segments) {
          if (seg.type !== 'text') { newSegments.push(seg); continue; }
          const idx = seg.value.toLowerCase().indexOf(term.toLowerCase());
          if (idx === -1) { newSegments.push(seg); continue; }
          if (idx > 0) newSegments.push({ type: 'text', value: seg.value.slice(0, idx) });
          newSegments.push({ type: 'shop', value: seg.value.slice(idx, idx + term.length), shop });
          const rest = seg.value.slice(idx + term.length);
          if (rest) newSegments.push({ type: 'text', value: rest });
        }
        segments = newSegments;
      }
      return segments.map(seg =>
        seg.type === 'shop'
          ? html`<span class="inline-block"><span onClick=${(e) => { e.stopPropagation(); onShopClick(seg.shop); }}
              class="underline decoration-2 cursor-pointer text-brandBlue hover:bg-brandPink inline-flex items-center gap-1"
              title="Haritada göster">📍 ${seg.value}</span><span class="text-xs font-bold ml-1 text-gray-500">(⚡${seg.shop.ratings?.hiz} ⭐${seg.shop.ratings?.kalite} 💰${seg.shop.ratings?.fiyat})</span></span>`
          : seg.value
      );
    }

    // ── ChatBot ────────────────────────────────────────────────────────────
    function ChatBot({ isChatOpen, setIsChatOpen, messages, input, setInput, handleSend, allShops, onShopClick }) {
      return html`
        <div class="fixed bottom-10 right-5 md:right-10 z-[9999]">
          ${isChatOpen && html`
            <div class="w-[90vw] md:w-[400px] h-[500px] brutal-card flex flex-col mb-6 overflow-hidden bg-white max-w-sm">
              <div class="bg-black text-brandYellow p-5 font-black uppercase flex justify-between items-center border-b-4 border-black">
                <span>TAMİR AI</span>
                <button onClick=${() => setIsChatOpen(false)} class="text-2xl hover:scale-125 transition-transform text-white">×</button>
              </div>
              <div class="flex-grow p-4 overflow-y-auto space-y-4 bg-white/60">
                ${messages.map(m => html`
                  <div class="p-3 border-4 border-black font-bold text-black ${m.role === 'bot' ? 'bg-brandYellow' : 'bg-white shadow-[4px_4px_0px_#000]'}">
                    ${m.role === 'bot' ? renderMessageWithShops(m.text, allShops, onShopClick) : m.text}
                  </div>
                `)}
              </div>
              <div class="p-4 border-t-4 border-black flex gap-2 bg-white">
                <input value=${input} onInput=${e => setInput(e.target.value)} onKeyPress=${e => e.key === 'Enter' && handleSend()}
                       class="flex-grow p-2 border-4 border-black outline-none font-bold" placeholder="Buraya yaz..." />
                <button onClick=${() => handleSend()} class="bg-black text-white px-4 border-4 border-black font-black">SOR</button>
              </div>
            </div>
          `}
          <button onClick=${() => setIsChatOpen(!isChatOpen)}
                  class="bg-brandBlue text-white w-16 h-16 md:w-20 md:h-20 brutal-card flex items-center justify-center hover:scale-110 transition-transform text-3xl md:text-4xl font-black shadow-[6px_6px_0px_#000] md:shadow-[10px_10px_0px_#000] ml-auto">
            ?
          </button>
        </div>
      `;
    }

    // ── Map ────────────────────────────────────────────────────────────────
    function Map({ selectedShop, setSelectedShop, customerLocation }) {
      const mapRef = useRef(null);
      const highlightRef = useRef(null);
      const [layers, setLayers] = useState({
        tamirciler: { active: true, title: 'TAMİRCİLER', sub: 'Terzi / Elektronik', color: 'bg-brandYellow', shape: 'square' },
        kamu: { active: true, title: 'KAMU BİNALARI', sub: 'İSMEK / Kütüphane', color: 'bg-brandPink', shape: 'square' },
        customerLocation: { active: true, title: 'MÜŞTERİ LOKASYONUٌ', sub: '400m Hizmet Alanı', color: 'bg-black', shape: 'square' }
      });
      const groupsRef = useRef(null);
      const mapInstance = useRef(null);

      useEffect(() => {
        if (!mapRef.current || mapInstance.current) return;
        const map = window.L.map(mapRef.current).setView([40.988, 29.045], 14);
        window.L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        mapInstance.current = map;
        groupsRef.current = { tamirciler: window.L.layerGroup(), kamu: window.L.layerGroup(), customerLocation: window.L.layerGroup() };
        fetch('./kadikoy_map_data.json').then(res => res.json()).then(data => {
          const icon = (bg) => window.L.divIcon({ className: '', html: `<div class="w-7 h-7 border-4 border-black shadow-[4px_4px_0px_#000] ${bg}"></div>`, iconSize: [28, 28] });
          if (data.tamirciler) Object.values(data.tamirciler).forEach(k => k.forEach(m => window.L.marker([m.lat, m.lon], { icon: icon('bg-brandYellow') }).bindPopup(`<b>${m.name}</b>`).addTo(groupsRef.current.tamirciler)));
          data.kamu?.forEach(m => window.L.marker([m.lat, m.lon], { icon: icon('bg-brandPink') }).bindPopup(`<b>${m.name}</b>`).addTo(groupsRef.current.kamu));
          Object.keys(layers).forEach(k => { if (layers[k].active) groupsRef.current[k].addTo(map); });
        });
      }, []);

      useEffect(() => {
        if (!mapInstance.current || !groupsRef.current) return;
        Object.keys(layers).forEach(k => { if (layers[k].active) mapInstance.current.addLayer(groupsRef.current[k]); else mapInstance.current.removeLayer(groupsRef.current[k]); });
      }, [layers]);

      useEffect(() => {
        if (!mapInstance.current) return;
        if (highlightRef.current) { mapInstance.current.removeLayer(highlightRef.current); highlightRef.current = null; }
        if (!selectedShop) return;
        mapInstance.current.flyTo([selectedShop.lat, selectedShop.lon], 17, { duration: 1.5 });
        const pulseIcon = window.L.divIcon({ className: '', html: '<div class="pulse-marker" style="width:32px;height:32px;background:#054ff0;border:4px solid #000;"></div>', iconSize: [32, 32] });
        highlightRef.current = window.L.marker([selectedShop.lat, selectedShop.lon], { icon: pulseIcon, zIndexOffset: 1000 })
          .bindPopup('<b>' + selectedShop.name + '</b><br/>Kategori: ' + selectedShop.kategori).addTo(mapInstance.current);
        setTimeout(() => { if (highlightRef.current) highlightRef.current.openPopup(); }, 1600);
      }, [selectedShop]);

      useEffect(() => {
        if (!mapInstance.current || !groupsRef.current) return;
        groupsRef.current.customerLocation.clearLayers();
        if (customerLocation) {
          const icon = window.L.divIcon({ className: '', html: `<div class="w-7 h-7 border-4 border-black shadow-[4px_4px_0px_#000] bg-black"></div>`, iconSize: [28, 28] });
          window.L.marker([customerLocation.lat, customerLocation.lon], { icon }).bindPopup('<b>Senin Konumun</b>').addTo(groupsRef.current.customerLocation);
          window.L.circle([customerLocation.lat, customerLocation.lon], { radius: 400, color: '#000', weight: 2, fillColor: '#054ff0', fillOpacity: 0.1, dashArray: '5, 10' }).addTo(groupsRef.current.customerLocation);
          if (layers.customerLocation.active) groupsRef.current.customerLocation.addTo(mapInstance.current);
          mapInstance.current.flyTo([customerLocation.lat, customerLocation.lon], 15, { duration: 1 });
        } else { mapInstance.current.removeLayer(groupsRef.current.customerLocation); }
      }, [customerLocation, layers]);

      return html`
        <div class="flex flex-col lg:flex-row gap-12 relative z-10">
          <div class="w-full lg:w-[450px] brutal-card p-6 md:p-10 space-y-10 bg-white/90 backdrop-blur-sm">
            <h3 class="text-4xl md:text-6xl font-black uppercase tracking-tighter border-b-8 border-black pb-4 italic">KATMANLAR</h3>
            ${selectedShop && html`
              <div class="mb-6 border-b-4 border-black pb-6">
                <h4 class="text-2xl md:text-3xl font-black uppercase tracking-tight mb-4">SEÇİLEN TAMİRCİ</h4>
                <div onClick=${() => { if (mapInstance.current && selectedShop) { mapInstance.current.flyTo([selectedShop.lat, selectedShop.lon], 17, { duration: 1 }); if (highlightRef.current) setTimeout(() => highlightRef.current.openPopup(), 1100); } }}
                  class="cursor-pointer border-4 border-black p-4 bg-brandBlue text-white shadow-[6px_6px_0px_#000] hover:translate-y-[-2px] hover:shadow-[6px_8px_0px_#000] transition-all">
                  <div class="text-xl md:text-2xl font-black uppercase leading-tight">${selectedShop.name}</div>
                  <div class="text-sm md:text-base font-bold mt-2 opacity-80 uppercase">${selectedShop.kategori}</div>
                  <div class="text-xs md:text-sm font-bold mt-2 opacity-60">📍 Haritada görmek için tıkla</div>
                </div>
                <button onClick=${() => setSelectedShop(null)} class="mt-3 w-full bg-black text-white border-4 border-black p-2 font-black uppercase text-base hover:bg-gray-800 transition-colors">KAPAT</button>
              </div>
            `}
            <div class="space-y-8">
              ${Object.entries(layers).map(([key, l]) => html`
                <div class="flex items-start gap-6 cursor-pointer" onClick=${() => setLayers(p => ({ ...p, [key]: { ...l, active: !l.active } }))}>
                  <div class="map-checkbox">${l.active && html`<div class="w-4 h-4 bg-black" style="clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%)"></div>`}</div>
                  <div class="w-10 h-10 border-4 border-black shrink-0 shadow-[3px_3px_0px_#000] ${l.color}"></div>
                  <div class="flex flex-col"><span class="text-2xl md:text-3xl font-black uppercase leading-none text-black">${l.title}</span><span class="text-lg md:text-xl font-bold text-gray-500 uppercase mt-1">${l.sub}</span></div>
                </div>
              `)}
            </div>
          </div>
          <div ref=${mapRef} class="w-full h-[500px] md:h-[700px] brutal-card bg-white"></div>
        </div>
      `;
    }

    // ── AletEdevat ─────────────────────────────────────────────────────────
    function AletEdevat({ borrowedTools, onBorrow, onReturn, getRemainingDays }) {
      const aletler = [
        { id: 1, name: 'MATKABİ',         emoji: '🔩', desc: 'Kordonsuz 18V Matkap',              days: 7, total: 3 },
        { id: 2, name: 'MERDİVEN',         emoji: '🪜', desc: '3 Basamaklı Çelik Merdiven',        days: 3, total: 2 },
        { id: 3, name: 'DİKİŞ MAKİNESİ',  emoji: '🧵', desc: 'Ev Tipi Dikiş Makinesi',            days: 5, total: 2 },
        { id: 4, name: 'TORNAVIDA SETİ',   emoji: '🪛', desc: 'Profesyonel Tornavida Takımı',      days: 7, total: 4 },
        { id: 5, name: 'TAŞLAMA',          emoji: '⚙️', desc: '115mm Taşlama Makinesi',            days: 2, total: 1 },
        { id: 6, name: 'ÖLÇÜM SETİ',       emoji: '📐', desc: 'Lazer Terazi & Dijital Metre',      days: 7, total: 3 },
      ];

      return html`
        <div class="space-y-6 md:space-y-8 mt-6 md:mt-8 relative z-10">
          <div class="flex flex-col md:flex-row md:items-end gap-3 md:gap-6">
            <div class="inline-block relative">
              <div class="absolute inset-0 bg-brandPink transform translate-x-2 translate-y-2 border-4 border-black"></div>
              <h2 class="relative bg-black text-white px-4 md:px-6 py-2 md:py-3 text-3xl md:text-5xl font-black uppercase tracking-tighter border-4 border-black">
                ALET / EDEVAT
              </h2>
            </div>
            <p class="font-bold text-base text-gray-500 pb-1">Mahalle alet kütüphanesi • Ödünç al, işini bitir, geri getir</p>
          </div>

          <div class="brutal-card p-4 md:p-5 bg-brandYellow/60 border-4 border-black flex items-start gap-4">
            <span class="text-3xl shrink-0">📦</span>
            <div>
              <p class="font-black uppercase">Aletleri ücretsiz ödünç alabilirsin!</p>
              <p class="font-bold text-sm opacity-70 mt-1">Süre dolunca aleti iade et — bir sonraki komşun bekliyor.</p>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            ${aletler.map(alet => {
              const isBorrowed = !!borrowedTools[alet.id];
              const remaining  = isBorrowed ? getRemainingDays(borrowedTools[alet.id].returnDate) : null;
              const isOverdue  = isBorrowed && remaining === 0;

              return html`
                <div class="brutal-card bg-white p-5 md:p-6 flex flex-col gap-4 border-[5px] transition-all
                            ${isBorrowed ? 'border-brandBlue shadow-[8px_8px_0px_#054ff0]' : 'hover:-translate-y-1'}">
                  <div class="flex justify-between items-start">
                    <span class="text-5xl">${alet.emoji}</span>
                    <span class="font-black text-xs uppercase border-2 border-black px-2 py-1 bg-mainBg">${alet.total} ADET</span>
                  </div>
                  <div>
                    <h3 class="text-xl md:text-2xl font-black uppercase leading-tight">${alet.name}</h3>
                    <p class="text-sm font-bold text-gray-500 mt-1">${alet.desc}</p>
                  </div>
                  <div class="mt-auto pt-3 border-t-4 border-black space-y-3">
                    ${isBorrowed ? html`
                      <div class="${isOverdue ? 'bg-red-100 border-red-500 text-red-700' : 'bg-brandYellow'} border-4 border-black p-3 text-center">
                        <p class="font-black text-sm uppercase leading-snug">
                          ${isOverdue
                            ? '⚠️ Süreniz doldu! Lütfen iade edin.'
                            : html`⏳ <span class="text-brandBlue text-xl">${remaining}</span> GÜN hakkınız kaldı`}
                        </p>
                      </div>
                      <button onClick=${() => onReturn(alet.id)} class="w-full bg-white border-4 border-black p-3 font-black text-lg uppercase brutal-btn hover:bg-gray-100 transition-colors">
                        İADE ET
                      </button>
                    ` : html`
                      <div class="flex justify-between items-center">
                        <span class="font-bold text-sm text-gray-500">Maks. ${alet.days} gün</span>
                        <span class="bg-brandYellow border-2 border-black px-2 py-1 text-xs font-black uppercase">ÜCRETSİZ</span>
                      </div>
                      <button onClick=${() => onBorrow(alet)} class="w-full bg-brandPink border-4 border-black p-3 font-black text-xl uppercase shadow-[4px_4px_0px_#000] hover:translate-y-1 hover:shadow-[2px_2px_0px_#000] transition-all">
                        ÖDÜNÇ AL
                      </button>
                    `}
                  </div>
                </div>
              `;
            })}
          </div>
        </div>
      `;
    }

    // ── Atığın ─────────────────────────────────────────────────────────────
    function Atig({ wasteItems, onAdd, onReserve, customerLocation, auth }) {
      const [tab, setTab] = useState('harita');
      const [form, setForm] = useState({ desc: '', amount: '1', category: 'Elektronik' });
      const [selectedWaste, setSelectedWaste] = useState(null);
      const wasteMapRef     = useRef(null);
      const wasteMapInst    = useRef(null);
      const markersRef      = useRef([]);

      const addWasteMarkers = (map, items) => {
        markersRef.current.forEach(m => { try { map.removeLayer(m); } catch(_) {} });
        markersRef.current = [];
        items.forEach(item => {
          if (!item.lat || !item.lon) return;
          const bg = { 'Elektronik': '#dcfc75', 'Tekstil': '#e1d2f3' }[item.category] ?? '#fff';
          const icon = window.L.divIcon({
            className: '',
            html: `<div style="background:${bg};border:4px solid #000;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:3px 3px 0 #000;${item.reserved ? 'opacity:0.45;' : ''}">${getCategoryEmoji(item.category)}</div>`,
            iconSize: [38, 38]
          });
          const marker = window.L.marker([item.lat, item.lon], { icon }).addTo(map);
          marker.on('click', () => setSelectedWaste(item));
          markersRef.current.push(marker);
        });
      };

      // Init / refresh map when harita tab active
      useEffect(() => {
        if (tab !== 'harita') {
          if (wasteMapInst.current) { wasteMapInst.current.remove(); wasteMapInst.current = null; }
          return;
        }
        const t = setTimeout(() => {
          if (!wasteMapRef.current) return;
          if (!wasteMapInst.current) {
            const map = window.L.map(wasteMapRef.current).setView([40.988, 29.045], 14);
            window.L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            wasteMapInst.current = map;
          }
          addWasteMarkers(wasteMapInst.current, wasteItems);
        }, 80);
        return () => clearTimeout(t);
      }, [tab, wasteItems]);

      // Cleanup on component unmount
      useEffect(() => () => {
        if (wasteMapInst.current) { wasteMapInst.current.remove(); wasteMapInst.current = null; }
      }, []);

      const handleAdd = () => {
        if (!form.desc.trim()) { alert('Lütfen bir açıklama girin!'); return; }
        const loc = customerLocation ?? {
          lat: 40.988 + (Math.random() - 0.5) * 0.014,
          lon: 29.045 + (Math.random() - 0.5) * 0.014,
        };
        onAdd({
          id: Date.now(),
          desc: form.desc.trim(),
          amount: Math.max(1, parseInt(form.amount) || 1),
          category: form.category,
          lat: loc.lat, lon: loc.lon,
          ownerEmail: auth.email,
          ownerName: auth.email.split('@')[0],
          reserved: false, reservedBy: null,
        });
        setForm({ desc: '', amount: '1', category: 'Elektronik' });
        setTab('harita');
      };

      const tabs = [
        { id: 'harita', label: '🗺️ Harita' },
        { id: 'liste',  label: '📋 Liste'  },
        { id: 'ekle',   label: '➕ Ekle'   },
      ];

      return html`
        <div class="space-y-6 md:space-y-8 mt-6 md:mt-8 relative z-10">
          <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div class="inline-block relative">
              <div class="absolute inset-0 bg-brandYellow transform translate-x-2 translate-y-2 border-4 border-black"></div>
              <h2 class="relative bg-black text-white px-4 md:px-6 py-2 md:py-3 text-3xl md:text-5xl font-black uppercase tracking-tighter border-4 border-black">
                ATIĞIN
              </h2>
            </div>
            <div class="flex gap-2 flex-wrap">
              ${tabs.map(t => html`
                <button onClick=${() => { setSelectedWaste(null); setTab(t.id); }}
                        class="px-4 py-2 border-4 border-black font-black uppercase text-base brutal-btn
                               ${tab === t.id ? 'bg-black text-white' : 'bg-white text-black'}">
                  ${t.label}
                </button>
              `)}
            </div>
          </div>

          ${tab === 'harita' && html`
            <div class="flex flex-col lg:flex-row gap-8">
              <div class="w-full lg:w-[320px] brutal-card p-5 bg-white space-y-4 shrink-0">
                <h3 class="text-2xl font-black uppercase border-b-4 border-black pb-3">LEJAND</h3>
                ${['Elektronik','Tekstil','Mobilya','Bisiklet','Diğer'].map(cat => html`
                  <div class="flex items-center gap-3">
                    <div class="w-9 h-9 border-4 border-black flex items-center justify-center text-base shrink-0">${getCategoryEmoji(cat)}</div>
                    <span class="font-bold uppercase text-sm">${cat}</span>
                  </div>
                `)}
                <div class="border-t-4 border-black pt-4">
                  <p class="font-black text-sm uppercase mb-1">Toplam Atık</p>
                  <p class="text-3xl font-black">${wasteItems.length} <span class="text-base font-bold text-gray-500">kayıt</span></p>
                  <p class="text-sm font-bold text-gray-500">${wasteItems.filter(w => w.reserved).length} rezerve edildi</p>
                </div>
                ${selectedWaste && html`
                  <div class="border-4 border-black p-4 bg-brandPink space-y-2">
                    <p class="font-black text-lg uppercase leading-tight">${selectedWaste.desc}</p>
                    <p class="font-bold text-sm">${selectedWaste.amount} adet • ${selectedWaste.category}</p>
                    <p class="font-bold text-xs text-gray-600">Sahibi: ${selectedWaste.ownerName}</p>
                    ${selectedWaste.reserved
                      ? html`<div class="bg-gray-200 border-4 border-black p-2 text-center font-black uppercase text-sm">REZERVE EDİLDİ</div>`
                      : selectedWaste.ownerEmail === auth.email
                        ? html`<div class="bg-brandYellow border-4 border-black p-2 text-center font-black uppercase text-sm">SENİN ATIĞIN</div>`
                        : html`<button onClick=${() => onReserve(selectedWaste)} class="w-full bg-black text-white border-4 border-black p-3 font-black uppercase hover:bg-gray-800 transition-colors">REZERVE ET</button>`
                    }
                    <button onClick=${() => setSelectedWaste(null)} class="w-full bg-white border-4 border-black p-2 font-black uppercase text-sm">KAPAT</button>
                  </div>

              </div>
              <div ref=${wasteMapRef} class="w-full h-[420px] md:h-[600px] brutal-card bg-white flex-1"></div>
            </div>
          `}

          ${tab === 'liste' && html`
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              ${wasteItems.length === 0 && html`
                <p class="col-span-3 text-center font-bold text-xl py-16 text-gray-400">Henüz atık eklenmemiş.</p>
              `}
              ${wasteItems.map(item => html`
                <div class="brutal-card bg-white p-5 border-[5px] flex flex-col gap-3 ${item.reserved ? 'opacity-55' : 'hover:-translate-y-1'} transition-transform">
                  <div class="flex justify-between items-start">
                    <span class="text-4xl">${getCategoryEmoji(item.category)}</span>
                    <span class="${item.reserved ? 'bg-gray-300 text-gray-500' : 'bg-brandYellow'} border-2 border-black px-2 py-1 text-xs font-black uppercase">
                      ${item.reserved ? 'REZERVE' : 'MEVCUT'}
                    </span>
                  </div>
                  <h3 class="text-xl font-black uppercase">${item.desc}</h3>
                  <p class="font-bold text-sm text-gray-600">${item.amount} adet • ${item.category}</p>
                  <p class="font-bold text-xs text-gray-400 border-t-2 border-dashed border-gray-200 pt-2">Sahibi: ${item.ownerName}</p>
                  ${!item.reserved && item.ownerEmail !== auth.email
                    ? html`<button onClick=${() => onReserve(item)} class="mt-auto w-full bg-brandPink border-4 border-black p-3 font-black uppercase brutal-btn">REZERVE ET</button>`
                    : item.ownerEmail === auth.email
                      ? html`<div class="mt-auto bg-brandYellow border-4 border-black p-2 text-center font-black text-sm uppercase">SENİN ATIĞIN</div>`
                      : html`<div class="mt-auto bg-gray-200 border-4 border-black p-2 text-center font-black text-sm uppercase">REZERVE EDİLDİ</div>`
                  }
                </div>
              `)}
            </div>
          `}

          ${tab === 'ekle' && html`
            <div class="max-w-2xl mx-auto brutal-card p-6 md:p-10 bg-white space-y-6">
              <h3 class="text-2xl font-black uppercase border-b-4 border-black pb-4">Yeni Atık Ekle</h3>

              <div>
                <label class="font-black uppercase text-sm block mb-3">Kategori</label>
                <div class="grid grid-cols-3 md:grid-cols-5 gap-2">
                  ${['Elektronik','Tekstil','Mobilya','Bisiklet','Diğer'].map(cat => html`
                    <button onClick=${() => setForm(f => ({...f, category: cat}))}
                            class="border-4 border-black p-2 font-black text-sm uppercase text-center transition-all
                                   ${form.category === cat ? 'bg-brandPink shadow-[3px_3px_0_#000] -translate-y-0.5' : 'bg-mainBg hover:bg-brandPink/40'}">
                      <div class="text-2xl mb-1">${getCategoryEmoji(cat)}</div>
                      <div class="text-xs">${cat}</div>
                    </button>
                  `)}
                </div>
              </div>

              <div>
                <label class="font-black uppercase text-sm block mb-2">Açıklama</label>
                <input value=${form.desc} onInput=${e => setForm(f => ({...f, desc: e.target.value}))}
                       placeholder="Örn: Kırık telefon, yırtık mont, eski sandalye..."
                       class="w-full border-4 border-black p-4 font-bold text-lg outline-none bg-mainBg" />
              </div>

              <div>
                <label class="font-black uppercase text-sm block mb-2">Adet</label>
                <input type="number" min="1" value=${form.amount} onInput=${e => setForm(f => ({...f, amount: e.target.value}))}
                       class="w-full border-4 border-black p-4 font-bold text-lg outline-none bg-mainBg" />
              </div>

              <div class="border-4 border-dashed border-gray-300 p-4 bg-mainBg">
                <p class="font-black text-sm uppercase mb-1">📍 Konum</p>
                <p class="font-bold text-sm text-gray-500">
                  ${customerLocation
                    ? `${customerLocation.lat.toFixed(4)}, ${customerLocation.lon.toFixed(4)} — mevcut konumunuz kullanılacak`
                    : 'Konum izni verilmemişse Kadıköy içinde rastgele konum atanır.'}
                </p>
              </div>

              <button onClick=${handleAdd}
                      class="w-full bg-brandYellow border-4 border-black p-4 font-black text-2xl uppercase shadow-[6px_6px_0_#000] hover:translate-y-1 hover:shadow-[4px_4px_0_#000] transition-all flex justify-center items-center gap-3">
                <${IconLeaf} /> ATIĞI PAYLAŞ
              </button>
            </div>
          `}
        </div>
      `;
    }

    // ── ImpactModal ────────────────────────────────────────────────────────

    // ── App ────────────────────────────────────────────────────────────────
    function App() {
      const [auth, setAuth]                             = useState({ loggedIn: false, role: null, email: null });
      const [selectedRole, setSelectedRole]             = useState(null);
      const [email, setEmail]                           = useState('');
      const [password, setPassword]                     = useState('');
      const [authError, setAuthError]                   = useState('');
      const [isLoggingIn, setIsLoggingIn]               = useState(false);
      const isLocal = window.location.protocol === 'file:' || ['localhost', '127.0.0.1'].includes(window.location.hostname);
      const apiBase = isLocal ? 'http://127.0.0.1:5001' : window.location.origin;

      const [view, setView]                             = useState('panel');
      const [puan, setPuan]                             = useState(250);
      const [kullanilanlar, setKullanilanlar]           = useState([]);
      const [isChatOpen, setIsChatOpen]                 = useState(false);
      const [messages, setMessages]                     = useState([{ role: 'bot', text: 'Merhaba bugün neyi tamir ediyoruz! :)' }]);
      const [chatInput, setChatInput]                   = useState('');
      const [matchCategory, setMatchCategory]           = useState('');
      const [matchDesc, setMatchDesc]                   = useState('');
      const [allShops, setAllShops]                     = useState([]);
      const [selectedShop, setSelectedShop]             = useState(null);
      const [customerLocation, setCustomerLocation]     = useState(null);
      const [locationPermissionAsked, setLocationPermissionAsked] = useState(false);

      // New feature state
      const [borrowedTools, setBorrowedTools]           = useState({});
      const [wasteItems, setWasteItems]                 = useState([
        { id: 1, desc: 'Kırık Ekranlı Telefon', amount: 2, category: 'Elektronik', lat: 40.9875, lon: 29.0441, ownerEmail: 'ayse@demo.com', ownerName: 'ayse', reserved: false, reservedBy: null },
        { id: 2, desc: 'Eski Kot Pantolon',      amount: 3, category: 'Tekstil',   lat: 40.9912, lon: 29.0378, ownerEmail: 'mehmet@demo.com', ownerName: 'mehmet', reserved: false, reservedBy: null },
        { id: 3, desc: 'Bozuk Tablet',           amount: 1, category: 'Elektronik', lat: 40.9843, lon: 29.0523, ownerEmail: 'fatma@demo.com', ownerName: 'fatma', reserved: false, reservedBy: null },
        { id: 4, desc: 'Hasarlı Bisiklet Jantı', amount: 1, category: 'Bisiklet',  lat: 40.9901, lon: 29.0495, ownerEmail: 'can@demo.com', ownerName: 'can', reserved: false, reservedBy: null },
      ]);
      const [impactModal, setImpactModal]               = useState(null);

      useEffect(() => {
        fetch('./kadikoy_map_data.json').then(res => res.json()).then(data => {
          const shops = [];
          if (data.tamirciler) {
            Object.entries(data.tamirciler).forEach(([kategori, dukkanlar]) => {
              dukkanlar.forEach(d => shops.push({ ...d, kategori, ratings: { hiz: (4 + Math.random()).toFixed(1), kalite: (4 + Math.random()).toFixed(1), fiyat: (4 + Math.random()).toFixed(1) } }));
            });
          }
          setAllShops(shops);
        });
      }, []);

      useEffect(() => {
        if (auth.loggedIn && auth.role === 'musteri' && view === 'panel' && !customerLocation && !locationPermissionAsked) {
          requestLocationPermission();
        }
      }, [auth, view, customerLocation, locationPermissionAsked]);

      const handleShopSelect = (shop) => { setSelectedShop(shop); setView('merkezler'); };

      const handleAuthSubmit = async () => {
        if (!email.trim() || !password.trim() || !selectedRole) { setAuthError('Lütfen e-posta, şifre ve rol seçimi tamamlayın.'); return; }
        setIsLoggingIn(true);
        setAuthError('');

        const localLogin = () => {
          setAuth({ loggedIn: true, role: selectedRole, email: email.trim().toLowerCase() });
          setSelectedRole(null); setEmail(''); setPassword(''); setAuthError('');
          setMessages([{ role: 'bot', text: 'Merhaba bugün neyi tamir ediyoruz! :)' }]);
          setIsLoggingIn(false);
        };

        const controller = new AbortController();
        const timer = setTimeout(() => { controller.abort(); localLogin(); }, 4000);

        try {
          const res  = await fetch(`${apiBase}/api/auth`, { signal: controller.signal, method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email.trim().toLowerCase(), password, role: selectedRole }) });
          clearTimeout(timer);
          const data = await res.json();
          if (!res.ok) { setAuthError(data.error || 'Giriş başarısız.'); setIsLoggingIn(false); return; }
          setAuth({ loggedIn: true, role: selectedRole, email: data.email });
          setSelectedRole(null); setEmail(''); setPassword(''); setAuthError('');
          setMessages([{ role: 'bot', text: 'Merhaba bugün neyi tamir ediyoruz! :)' }]);
          setIsLoggingIn(false);
        } catch (_) {
          clearTimeout(timer);
          if (!controller.signal.aborted) localLogin();
        }
      };

      const handleSend = async (customMsg = null) => {
        const msgToSend = customMsg || chatInput;
        if (!msgToSend.trim()) return;
        const currentHistory = [...messages];
        setMessages(prev => [...prev, { role: 'user', text: msgToSend }]);
        if (!customMsg) setChatInput('');
        try {
          const res = await fetch(`${apiBase}/api/chat`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msgToSend, history: currentHistory.map(m => ({ role: m.role === 'bot' ? 'assistant' : 'user', text: m.text })), userEmail: auth.email, userRole: auth.role, ...(customerLocation && { customerLocation }) })
          });
          if (!res.ok) throw new Error();
          const data = await res.json();
          setMessages(prev => [...prev, { role: 'bot', text: data.reply }]);
        } catch (_) { setMessages(prev => [...prev, { role: 'bot', text: 'Bağlantı pürüzlü kanka!' }]); }
      };

      const requestLocationPermission = () => {
        setLocationPermissionAsked(true);
        if (!navigator.geolocation) { setMessages(prev => [...prev, { role: 'bot', text: 'Maalesef tarayıcın konum bilgisini desteklemiyor!' }]); return; }
        navigator.geolocation.getCurrentPosition(
          pos => { setCustomerLocation({ lat: pos.coords.latitude, lon: pos.coords.longitude }); setView('merkezler'); setMessages(prev => [...prev, { role: 'bot', text: '✅ Konumun bulundu! Haritada seni siyah kutucukla gösterecek ve etrafındaki 400m\'deki usta arkadaşları önerebilirim!' }]); },
          ()  => { setMessages(prev => [...prev, { role: 'bot', text: 'Konum bilgisini alamadım. Lütfen tarayıcı ayarlarında konum iznini kontrol et!' }]); }
        );
      };

      const triggerMatch = () => {
        if (!matchCategory || !matchDesc) { alert('Kanka lütfen bir kategori seçip sorunu kısaca anlat!'); return; }
        const query = `Kategori: ${matchCategory}. Eşyamın sorunu şu: "${matchDesc}". Bana veri tabanındaki tamircilerden en uygununu önerir misin?`;
        setIsChatOpen(true); handleSend(query); setMatchDesc(''); setMatchCategory('');
      };

      const handleKullan = (kampanya) => {
        if (kullanilanlar.includes(kampanya.id) || puan < kampanya.points) return;
        setPuan(prev => prev - kampanya.points);
        setKullanilanlar(prev => [...prev, kampanya.id]);
        alert(`Tebrikler! ${kampanya.title} ödülünü başarıyla aldın. Yeni puanın: ${puan - kampanya.points}`);
      };

      // ── Tool Library handlers ──
      const borrowTool = (tool) => {
        const now        = new Date();
        const returnDate = new Date(now.getTime() + tool.days * 86400000);
        setBorrowedTools(prev => ({ ...prev, [tool.id]: { borrowDate: now.toISOString(), returnDate: returnDate.toISOString(), toolName: tool.name } }));
        alert(`${tool.name} başarıyla ödünç alındı! ${tool.days} gün içinde iade etmeyi unutma.`);
      };
      const returnTool = (toolId) => {
        setBorrowedTools(prev => { const n = {...prev}; delete n[toolId]; return n; });
      };
      const getRemainingDays = (returnDateStr) => {
        const diff = new Date(returnDateStr) - new Date();
        return Math.max(0, Math.ceil(diff / 86400000));
      };

      // ── Waste handlers ──
      const handleAddWaste = (item) => setWasteItems(prev => [...prev, item]);
      const handleReserveWaste = (item) => {
        if (item.reserved)                     { alert('Bu atık zaten rezerve edilmiş!'); return; }
        if (item.ownerEmail === auth.email)    { alert('Kendi atığınızı rezerve edemezsiniz!'); return; }
        setWasteItems(prev => prev.map(w => w.id === item.id ? {...w, reserved: true, reservedBy: auth.email} : w));
        const impact = calcImpact(item.category, item.amount);
        setPuan(prev => prev + impact.points);
        setImpactModal({ ...impact, item: `${item.amount} adet ${item.desc}`, type: 'atik' });
      };

      // ── Repair impact (from SON TAMİRLER click) ──
      const handleShowRepairImpact = (repair) => {
        setImpactModal({ co2: repair.co2, water: repair.water, trees: Math.max(1, Math.round(repair.co2 / 21)), points: repair.puan, item: repair.isim, type: 'tamir' });
      };

      // ── Tamirci job take ──
      const handleJobTake = (job) => {
        const impact = calcImpact(job.kategori === 'Bisiklet' ? 'Bisiklet' : job.kategori, 1);
        setPuan(prev => prev + parseInt(job.ucret));

              </div>
            `}

            ${view === 'merkezler' && html`<${Map} selectedShop=${selectedShop} setSelectedShop=${setSelectedShop} customerLocation=${customerLocation} />`}

            ${view === 'kampanyalar' && html`
              <div class="space-y-6 md:space-y-8 mt-6 md:mt-8 relative z-10">
                <div class="inline-block relative mb-4 md:mb-6">
                  <div class="absolute inset-0 bg-brandYellow transform translate-x-1 translate-y-1 md:translate-x-2 md:translate-y-2 border-4 border-black"></div>
                  <h2 class="relative bg-black text-white px-4 md:px-6 py-2 md:py-3 text-3xl md:text-5xl font-black uppercase tracking-tighter border-4 border-black">ÖDÜLLERİ KULLAN</h2>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
                  ${kampanyalarData.map(k => {
                    const isUsed   = kullanilanlar.includes(k.id);
                    const isLocked = puan < k.points;
                    const btnText  = isUsed ? 'KULLANILDI' : (isLocked ? 'KİLİTLİ' : 'KULLAN');
                    const btnClass = (isUsed || isLocked)
                      ? 'bg-[#c0c0c0] text-gray-600 cursor-not-allowed'
                      : 'bg-brandYellow text-black active:translate-y-1 active:translate-x-1 active:shadow-none transition-all shadow-[2px_2px_0px_0px_#000] md:shadow-[3px_3px_0px_0px_#000]';
                    return html`
                      <div class="border-[4px] md:border-[6px] border-black shadow-[4px_4px_0px_0px_#000] md:shadow-[8px_8px_0px_0px_#000] p-4 md:p-6 flex flex-col relative ${k.color} transition-transform hover:-translate-y-1">
                        <div class="absolute -top-3 md:-top-4 right-2 md:right-4 bg-black text-white px-2 md:px-4 py-1 text-sm md:text-lg font-bold transform rotate-[4deg] border-2 md:border-4 border-black">${k.tag}</div>
                        <h3 class="text-2xl md:text-3xl font-black uppercase mb-3 md:mb-4 pr-10 md:pr-12 leading-none mt-2 ${k.color.includes('text-white') ? 'text-white' : 'text-black'}">${k.title}</h3>
                        <div class="bg-mainBg border-[3px] md:border-[4px] border-black p-3 md:p-4 min-h-[80px] md:min-h-[120px] flex items-center justify-center text-center">
                          <p class="font-bold text-lg md:text-xl uppercase leading-tight text-black">${k.desc}</p>
                        </div>
                        <hr class="border-t-[4px] md:border-t-[6px] border-black my-4 md:my-5" />
                        <div class="flex justify-between items-center mt-auto">
                          <div class="bg-white border-[3px] md:border-[4px] border-black px-2 md:px-3 py-1">
                            <span class="text-xl md:text-2xl font-black uppercase text-black">${k.points} PUAN</span>
                          </div>
                          <button onClick=${() => handleKullan(k)} class="px-3 md:px-5 py-1 md:py-2 border-[3px] md:border-[4px] border-black font-black text-lg md:text-xl uppercase ${btnClass}">${btnText}</button>
                        </div>
                      </div>
                    `;
                  })}
                </div>
              </div>
            `}

            ${view === 'aletler' && html`
              <${AletEdevat}
                borrowedTools=${borrowedTools}
                onBorrow=${borrowTool}
                onReturn=${returnTool}
                getRemainingDays=${getRemainingDays}
              />
            `}

            ${view === 'atig' && html`
              <${Atig}
                wasteItems=${wasteItems}
                onAdd=${handleAddWaste}
                onReserve=${handleReserveWaste}
                customerLocation=${customerLocation}
                auth=${auth}
              />
            `}
          </main>

          <${ChatBot}
            isChatOpen=${isChatOpen}
            setIsChatOpen=${setIsChatOpen}
            messages=${messages}
            input=${chatInput}
            setInput=${setChatInput}
            handleSend=${handleSend}
            allShops=${allShops}
            onShopClick=${handleShopSelect}
          />

          ${impactModal && html`<${ImpactModal} data=${impactModal} onClose=${() => setImpactModal(null)} />`}
        </div>
      `;
    }

    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
