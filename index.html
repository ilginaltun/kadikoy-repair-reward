<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadıköy Tamir & Ödül v4.0</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --background: #fcf7f5;
      --foreground: #000000;
      --border: #000000;
      --shadow: 8px 8px 0px 0px var(--border);
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: 'Poppins', sans-serif;
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .brutal-card {
      background: #ffffff;
      border: 5px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.1s ease;
    }

    .brutal-btn {
      border: 4px solid #000;
      box-shadow: 6px 6px 0px 0px #000;
      transition: all 0.1s ease;
    }

    .brutal-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px #000;
    }

    .sticker-drop { filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 1)); }
  </style>

  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          colors: { brandYellow: '#dcfc75', brandPink: '#e1d2f3', brandBlue: '#054ff0', mainBg: '#fcf7f5' } 
        } 
      } 
    }
  </script>
</head>

<body class="p-4 md:p-10 min-h-screen">
  <div id="root"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.6';
    import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.19.6/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    // --- COMPONENTLER ---
    function ChatBot({ isChatOpen, setIsChatOpen, messages, input, setInput, handleSend }) {
      return html`
        <div class="fixed bottom-10 right-5 md:right-10 z-[9999]">
          ${isChatOpen && html`
            <div class="w-[90vw] md:w-[400px] h-[500px] brutal-card flex flex-col mb-6 overflow-hidden bg-white max-w-sm">
              <div class="bg-black text-brandYellow p-5 font-black uppercase flex justify-between items-center border-b-4 border-black">
                <span>TAMİR AI</span>
                <button onClick=${() => setIsChatOpen(false)} class="text-2xl text-white">×</button>
              </div>
              <div class="flex-grow p-4 overflow-y-auto space-y-4">
                ${messages.map(m => html`
                  <div class="p-3 border-4 border-black font-bold ${m.role === 'bot' ? 'bg-brandYellow' : 'bg-white shadow-[4px_4px_0px_#000]'}">
                    ${m.text}
                  </div>
                `)}
              </div>
              <div class="p-4 border-t-4 border-black flex gap-2">
                <input value=${input} onInput=${e => setInput(e.target.value)} onKeyPress=${e => e.key === 'Enter' && handleSend()} 
                       class="flex-grow p-2 border-4 border-black outline-none font-bold" />
                <button onClick=${() => handleSend()} class="bg-black text-white px-4 border-4 border-black font-black">SOR</button>
              </div>
            </div>
          `}
          <button onClick=${() => setIsChatOpen(!isChatOpen)} 
                  class="bg-brandBlue text-white w-20 h-20 brutal-card flex items-center justify-center text-4xl font-black">?</button>
        </div>
      `;
    }

    function App() {
      const [auth, setAuth] = useState({ loggedIn: false, role: null });
      const [view, setView] = useState('panel');
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [messages, setMessages] = useState([{ role: 'bot', text: 'Merhaba! Bugün neyi tamir ediyoruz?' }]);
      const [chatInput, setChatInput] = useState('');

      const tamirciIsleri = [
        { id: 1, baslik: 'Kırık Ekran', kategori: 'Elektronik', musteri: 'Ahmet Y.', konum: 'Moda Sahil', aciliyet: 'Yüksek', ucret: '500 Puan', img: 'telefon.png' },
        { id: 2, baslik: 'Fermuar Değişimi', kategori: 'Tekstil', musteri: 'Zeynep K.', konum: 'Yeldeğirmeni', aciliyet: 'Orta', ucret: '150 Puan', img: 'dikiş makinesi.png' },
        { id: 3, baslik: 'Vites Ayarı', kategori: 'Bisiklet', musteri: 'Can B.', konum: 'Osmanağa', aciliyet: 'Düşük', ucret: '200 Puan', img: 'bisiklet.png' }
      ];

      const handleSend = () => {
        if (!chatInput.trim()) return;
        setMessages([...messages, { role: 'user', text: chatInput }]);
        setChatInput('');
      };

      if (!auth.loggedIn) {
        return html`
          <div class="min-h-screen flex flex-col items-center justify-center">
             <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter text-center mb-12">TAMİR<br/><span class="text-brandBlue">&</span> ÖDÜL</h1>
             <div class="brutal-card p-10 bg-white max-w-md w-full text-center space-y-6">
                <button onClick=${() => setAuth({loggedIn: true, role: 'musteri'})} class="w-full brutal-btn bg-brandPink p-6 font-black text-2xl uppercase">MÜŞTERİ 🙋🏻‍♀️</button>
                <button onClick=${() => setAuth({loggedIn: true, role: 'tamirci'})} class="w-full brutal-btn bg-brandBlue text-white p-6 font-black text-2xl uppercase">TAMİRCİ 🔧</button>
             </div>
          </div>
        `;
      }

      if (auth.role === 'tamirci') {
        return html`
          <div class="max-w-7xl mx-auto space-y-12">
            <header class="flex justify-between items-center border-b-8 border-black pb-8">
              <h1 class="text-6xl font-black uppercase leading-none">USTA<br/><span class="text-brandBlue">PANELİ</span></h1>
              <button onClick=${() => setAuth({loggedIn: false, role: null})} class="bg-white border-4 border-black px-6 py-3 font-black uppercase text-xl brutal-btn">ÇIKIŞ</button>
            </header>

            <main class="space-y-10">
              <h2 class="inline-block bg-black text-white px-6 py-3 text-3xl font-black uppercase border-4 border-black">YAKINDAKİ İŞLER</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                ${tamirciIsleri.map(is => html`
                  <div class="brutal-card p-8 flex flex-col bg-white">
                    <div class="flex justify-between mb-8">
                      <span class="bg-brandPink border-2 border-black px-4 py-1 font-black text-xs uppercase">${is.kategori}</span>
                      <span class="bg-mainBg border-2 border-black px-2 py-1 font-bold text-[10px] uppercase">${is.konum}</span>
                    </div>
                    
                    <div class="flex flex-col items-center text-center mb-8 gap-6">
                      <img src="${is.img}" class="w-24 h-24 md:w- md:h-56 object-contain sticker-drop" />
                      <h3 class="text-3xl md:text-4xl font-black uppercase leading-none">${is.baslik}</h3>
                    </div>

                    <p class="font-bold border-b-4 border-dotted border-black pb-4 mb-6 text-center uppercase">Müşteri: ${is.musteri}</p>
                    
                    <div class="mt-auto space-y-4">
                      <div class="flex justify-between items-center bg-brandYellow border-4 border-black p-4">
                        <span class="font-black text-2xl text-brandBlue italic">${is.ucret}</span>
                        <span class="font-black uppercase text-xs ${is.aciliyet === 'Yüksek' ? 'text-red-600 animate-pulse' : ''}">${is.aciliyet} ACİL</span>
                      </div>
                      <button class="w-full bg-black text-white border-4 border-black p-4 font-black text-xl uppercase brutal-btn">İŞİ AL</button>
                    </div>
                  </div>
                `)}
              </div>
            </main>
            <${ChatBot} isChatOpen=${isChatOpen} setIsChatOpen=${setIsChatOpen} messages=${messages} input=${chatInput} setInput=${setChatInput} handleSend=${handleSend} />
          </div>
        `;
      }

      // Varsayılan Müşteri Paneli
      return html`
        <div class="max-w-7xl mx-auto space-y-12">
          <header class="flex justify-between items-center border-b-8 border-black pb-8">
            <h1 class="text-7xl font-black uppercase text-black">PANEL</h1>
            <button onClick=${() => setAuth({loggedIn: false, role: null})} class="px-6 py-4 brutal-btn font-black text-xl uppercase bg-white">ÇIKIŞ</button>
          </header>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="brutal-card p-10 bg-brandBlue text-white text-center">
              <h2 class="text-4xl font-black uppercase mb-2">PUANIN</h2>
              <div class="text-9xl font-black leading-none">250</div>
            </div>
            <div class="brutal-card p-10 bg-white flex flex-col items-center">
              <canvas id="user-qr-code" class="border-4 border-black"></canvas>
            </div>
          </div>
          <${ChatBot} isChatOpen=${isChatOpen} setIsChatOpen=${setIsChatOpen} messages=${messages} input=${chatInput} setInput=${setChatInput} handleSend=${handleSend} />
        </div>
      `;
    }

    render(html`<${App} />`, document.getElementById('root'));

    setTimeout(() => {
      const canvas = document.getElementById('user-qr-code');
      if (canvas) window.QRCode.toCanvas(canvas, "TAMIR-2026-ILGIN", { width: 220, margin: 1 });
    }, 500);
  </script>
</body>
</html>
