<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadıköy Tamir & Ödül - Restore Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --background: #fcf7f5;
      --brand-blue: #054ff0;
      --brand-lime: #dcfc75;
      --brand-lavender: #e1d2f3;
      --black: #000000;
      --white: #ffffff;
    }

    body {
      background-color: var(--background);
      color: var(--black);
      font-family: 'Poppins', sans-serif;
      background-image: linear-gradient(var(--brand-lavender) 1px, transparent 1px), linear-gradient(90deg, var(--brand-lavender) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .brutal-card { background: var(--white); border: 5px solid var(--black); box-shadow: 10px 10px 0px 0px var(--black); transition: all 0.15s ease; }
    .brutal-btn { border: 4px solid var(--black); box-shadow: 5px 5px 0px 0px var(--black); transition: all 0.1s ease; font-weight: 900; text-transform: uppercase; }
    .brutal-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px 0px var(--black); }
    
    /* Harita Yanıp Sönme Animasyonu */
    @keyframes pulse-highlight {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.5); filter: brightness(1.5); box-shadow: 0 0 20px var(--brand-blue); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .highlight-marker { animation: pulse-highlight 1s ease-in-out infinite; z-index: 1000 !important; }

    .leaflet-container { border: 5px solid var(--black) !important; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>

  <script>
    tailwind.config = { theme: { extend: { colors: { brandLime: '#dcfc75', brandBlue: '#054ff0', brandLavender: '#e1d2f3' } } } }
  </script>
</head>

<body class="p-4 md:p-8 min-h-screen">
  <div id="root"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.6';
    import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.19.6/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    // Ikonlar
    const IconHome = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
    const IconSearch = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
    const IconGift = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/></svg>`;
    const IconMap = () => html`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/></svg>`;

    function App() {
      const [view, setView] = useState('merkezler');
      const [puan, setPuan] = useState(450);
      const [messages, setMessages] = useState([{ role: 'bot', text: 'Merhaba Ilgın! Bugün Kadıköy\'de neyi tamir ediyoruz?' }]);
      const [chatInput, setChatInput] = useState('');
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [matchCategory, setMatchCategory] = useState('');
      const [matchDesc, setMatchDesc] = useState('');
      
      const mapInstance = useRef(null);
      const markersRef = useRef({});

      // Feature 3: 12 Adet Ödül Verisi
      const kampanyalarData = [
        { id: 1, title: 'KADIKÖY SİNEMASI', desc: 'Ücretsiz Sinema Bileti', points: 300, color: 'bg-brandLavender' },
        { id: 2, title: 'STORY COFFEE', desc: 'Ücretsiz V60 Kahve', points: 100, color: 'bg-brandLime' },
        { id: 3, title: 'MODA BİSİKLET', desc: 'Tam Kapsamlı Bakım', points: 250, color: 'bg-brandBlue', text: 'text-white' },
        { id: 4, title: 'DÜKKAN KADIKÖY', desc: 'Sıfır Atık Başlangıç Seti', points: 200, color: 'bg-brandLavender' },
        { id: 5, title: 'BİNA CAFE', desc: 'Akşam Yemeği Menüsü', points: 400, color: 'bg-brandLime' },
        { id: 6, title: 'SÜREYYA OPERASI', desc: 'İki Kişilik Konser Bileti', points: 500, color: 'bg-brandBlue', text: 'text-white' },
        { id: 7, title: 'NAZIM HİKMET K.M.', desc: 'Tiyatro Atölyesi Katılımı', points: 150, color: 'bg-brandLavender' },
        { id: 8, title: 'TASARIM ATÖLYESİ', desc: '3D Baskı Kontörü (10 saat)', points: 350, color: 'bg-brandLime' },
        { id: 9, title: 'MEPHISTO KİTABEVİ', desc: '150 TL Kitap Çeki', points: 220, color: 'bg-brandBlue', text: 'text-white' },
        { id: 10, title: 'KADIKÖY SAHNE', desc: '%50 İndirimli Giriş', points: 180, color: 'bg-brandLavender' },
        { id: 11, title: 'GORA TERZİ', desc: 'Pantolon Paça/Daraltma', points: 80, color: 'bg-brandLime' },
        { id: 12, title: 'YELDEĞİRMENİ SANAT', desc: 'Seramik Atölyesi Bileti', points: 280, color: 'bg-brandBlue', text: 'text-white' }
      ];

      // Feature 2: Puan Geçmişi Verisi
      const sonTamirlerData = [
        { isim: 'TOST MAKİNESİ', tarih: '12.04.2026', puan: '+50' },
        { isim: 'KOT PANTOLON', tarih: '08.04.2026', puan: '+30' },
        { isim: 'BİSİKLET ZİNCİRİ', tarih: '02.04.2026', puan: '+120' },
        { isim: 'GİTAR AMFİSİ', tarih: '25.03.2026', puan: '+200' }
      ];

      useEffect(() => {
        if (view === 'merkezler' && !mapInstance.current) {
          const map = L.map('map-container').setView([40.988, 29.045], 14);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
          mapInstance.current = map;

          fetch('./kadikoy_map_data.json').then(res => res.json()).then(data => {
            Object.values(data.tamirciler).flat().forEach(m => {
              const marker = L.marker([m.lat, m.lon], {
                icon: L.divIcon({ className: 'brutal-marker', html: `<div style="background:white; border:3px solid black; width:20px; height:20px;"></div>` })
              }).bindPopup(`<b>${m.name}</b>`).addTo(map);
              markersRef.current[m.name.toLowerCase()] = marker;
            });
          });
        }
      }, [view]);

      // Feature 1: Harita Yanıp Sönme & Linkleme Mantığı
      const highlightShopOnMap = (text) => {
        Object.keys(markersRef.current).forEach(shopName => {
          if (text.toLowerCase().includes(shopName)) {
            const marker = markersRef.current[shopName];
            setView('merkezler');
            setTimeout(() => {
              mapInstance.current.flyTo(marker.getLatLng(), 16);
              const element = marker.getElement();
              if (element) {
                element.classList.add('highlight-marker');
                setTimeout(() => element.classList.remove('highlight-marker'), 5000);
              }
            }, 500);
          }
        });
      };

      const handleSend = async (customMsg = null) => {
        const msg = customMsg || chatInput;
        if (!msg.trim()) return;
        setMessages(prev => [...prev, { role: 'user', text: msg }]);
        setChatInput('');
        
        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, history: messages.map(m => ({ role: m.role === 'bot' ? 'assistant' : 'user', text: m.text })) })
          });
          const data = await res.json();
          setMessages(prev => [...prev, { role: 'bot', text: data.reply }]);
          highlightShopOnMap(data.reply); // Otomatik Harita Tetikleyici
        } catch (e) {
          setMessages(prev => [...prev, { role: 'bot', text: "Bağlantı hatası kanka!" }]);
        }
      };

      return html`
        <div class="max-w-6xl mx-auto space-y-8">
          <header class="border-b-8 border-black pb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-7xl font-black italic tracking-tighter">TAMİR <span class="text-brandBlue">&</span> ÖDÜL</h1>
            <nav class="grid grid-cols-4 gap-2 w-full md:w-auto">
              <button onClick=${() => setView('panel')} class="p-3 brutal-btn ${view === 'panel' ? 'bg-black text-white' : 'bg-white'}"><${IconHome}/></button>
              <button onClick=${() => setView('ustalar')} class="p-3 brutal-btn ${view === 'ustalar' ? 'bg-black text-white' : 'bg-brandLime'}"><${IconSearch}/></button>
              <button onClick=${() => setView('kampanyalar')} class="p-3 brutal-btn ${view === 'kampanyalar' ? 'bg-black text-white' : 'bg-white'}"><${IconGift}/></button>
              <button onClick=${() => setView('merkezler')} class="p-3 brutal-btn ${view === 'merkezler' ? 'bg-black text-white' : 'bg-brandBlue text-white'}"><${IconMap}/></button>
            </nav>
          </header>

          <main>
            ${view === 'panel' && html`
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="brutal-card p-10 bg-brandBlue text-white text-center">
                  <h2 class="text-4xl font-black mb-4">MEVCUT PUANIN</h2>
                  <div class="text-[120px] leading-none font-black">${puan}</div>
                </div>
                <div class="brutal-card p-6 bg-white overflow-y-auto max-h-[400px]">
                  <h3 class="text-2xl font-black border-b-4 border-black mb-4">SON KAZANILAN PUANLAR</h3>
                  <table class="w-full text-left font-bold uppercase">
                    ${sonTamirlerData.map(item => html`
                      <tr class="border-b-2 border-black/10">
                        <td class="py-3">${item.isim}</td>
                        <td class="text-gray-500">${item.tarih}</td>
                        <td class="text-right text-green-600">${item.puan}</td>
                      </tr>
                    `)}
                  </table>
                </div>
              </div>
            `}

            ${view === 'ustalar' && html`
              <div class="max-w-3xl mx-auto brutal-card p-8 space-y-6">
                <h2 class="text-4xl font-black uppercase bg-black text-brandLime px-4 inline-block">Ustanla Eşleş</h2>
                <div class="grid grid-cols-2 gap-4">
                  ${['Elektronik', 'Mobilya', 'Tekstil', 'Ayakkabı'].map(c => html`
                    <button onClick=${() => setMatchCategory(c)} class="p-4 border-4 border-black font-black uppercase ${matchCategory === c ? 'bg-brandBlue text-white' : 'bg-gray-100'}">${c}</button>
                  `)}
                </div>
                <textarea onInput=${e => setMatchDesc(e.target.value)} class="w-full border-4 border-black p-4 font-bold h-32" placeholder="Cihazın nesi var?"></textarea>
                <button onClick=${() => { setIsChatOpen(true); handleSend(`Kategori: ${matchCategory}. Sorun: ${matchDesc}`); }} class="w-full bg-brandLime p-5 border-4 border-black font-black text-2xl uppercase">USTA BUL</button>
              </div>
            `}

            ${view === 'kampanyalar' && html`
              <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                ${kampanyalarData.map(k => html`
                  <div class="brutal-card p-4 ${k.color} ${k.text || 'text-black'} flex flex-col justify-between h-64">
                    <h3 class="text-xl font-black leading-tight">${k.title}</h3>
                    <p class="font-bold opacity-80">${k.desc}</p>
                    <div class="bg-black text-white text-center py-2 font-black text-lg">${k.points} PUAN</div>
                  </div>
                `)}
              </div>
            `}

            ${view === 'merkezler' && html`<div id="map-container" class="w-full h-[600px] border-8 border-black shadow-[15px_15px_0px_0px_#000]"></div>`}
          </main>

          <div class="fixed bottom-8 right-8 z-[1000]">
            ${isChatOpen && html`
              <div class="w-80 h-[500px] brutal-card bg-white flex flex-col mb-4 overflow-hidden">
                <div class="bg-black text-brandLime p-4 font-black flex justify-between">TAMİR AI <button onClick=${() => setIsChatOpen(false)}>X</button></div>
                <div class="flex-grow p-4 overflow-y-auto space-y-4 bg-gray-50">
                  ${messages.map(m => html`<div class="p-3 border-2 border-black font-bold ${m.role === 'bot' ? 'bg-brandLime' : 'bg-white shadow-[3px_3px_0px_#000]'}">${m.text}</div>`)}
                </div>
                <div class="p-2 border-t-4 border-black flex gap-2">
                  <input value=${chatInput} onInput=${e => setChatInput(e.target.value)} onKeyPress=${e => e.key === 'Enter' && handleSend()} class="flex-grow p-2 border-2 border-black outline-none font-bold" />
                  <button onClick=${() => handleSend()} class="bg-black text-white px-4 font-black">SOR</button>
                </div>
              </div>
            `}
            <button onClick=${() => setIsChatOpen(!isChatOpen)} class="w-20 h-20 bg-brandBlue text-white border-8 border-black text-5xl font-black shadow-[10px_10px_0px_#000]">?</button>
          </div>
        </div>
      `;
    }

    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
