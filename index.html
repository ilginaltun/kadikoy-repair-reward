<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadıköy Tamir & Ödül - Brutalist Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      /* YENİ RENK PALETİ */
      --bg-color: #fcf7f5;
      --brand-blue: #054ff0;
      --brand-lime: #dcfc75;
      --brand-lavender: #e1d2f3;
      --black: #000000;
      --white: #ffffff;
      
      --shadow-brutal: 10px 10px 0px 0px var(--black);
    }

    body {
      background-color: var(--bg-color);
      color: var(--black);
      font-family: 'Poppins', sans-serif; /* Font güncellendi */
      
      /* KARELİ DEFTER (GRID) ARKA PLAN */
      background-image: 
        linear-gradient(var(--brand-lavender) 2px, transparent 2px),
        linear-gradient(90deg, var(--brand-lavender) 2px, transparent 2px);
      background-size: 40px 40px;
      background-position: center center;
      overflow-x: hidden;
    }

    /* Sunumdaki gibi ultra kalın brutalist kartlar */
    .brutal-card { 
      background: var(--white); 
      border: 6px solid var(--black); 
      box-shadow: var(--shadow-brutal); 
      transition: all 0.15s ease; 
    }

    .brutal-btn { 
      border: 5px solid var(--black); 
      box-shadow: 6px 6px 0px 0px var(--black); 
      transition: all 0.1s ease; 
      text-transform: uppercase;
      font-weight: 900;
    }

    .brutal-btn:active { 
      transform: translate(4px, 4px); 
      box-shadow: 2px 2px 0px 0px var(--black); 
    }

    .leaflet-container { 
      border: 6px solid var(--black) !important; 
      background: var(--bg-color) !important; 
    }

    .map-checkbox { 
      appearance: none; 
      background: var(--white); 
      width: 2.5rem; 
      height: 2.5rem; 
      border: 5px solid var(--black); 
      display: grid; 
      place-content: center; 
      cursor: pointer; 
    }

    .map-checkbox:checked::before { 
      content: ""; 
      width: 1.4rem; 
      height: 1.4rem; 
      background: var(--brand-blue); /* İşaret rengi mavi yapıldı */
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); 
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .sticker-drop { filter: drop-shadow(6px 6px 0px rgba(0, 0, 0, 1)); }
  </style>

  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          colors: { 
            brandLime: '#dcfc75', 
            brandBlue: '#054ff0', 
            brandLavender: '#e1d2f3',
            brandBg: '#fcf7f5'
          } 
        } 
      } 
    }
  </script>
</head>

<body class="p-4 md:p-10 relative min-h-screen">
  <div id="root"></div>
  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.6';
    import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.19.6/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    const IconHome = () => html`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
    const IconGift = () => html`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>`;
    const IconMap = () => html`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>`;
    const IconSearch = () => html`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;

    function ChatBot({ isChatOpen, setIsChatOpen, messages, input, setInput, handleSend }) {
      return html`
        <div class="fixed bottom-10 right-5 md:right-10 z-[9999]">
          ${isChatOpen && html`
            <div class="w-[90vw] md:w-[400px] h-[550px] brutal-card flex flex-col mb-6 overflow-hidden bg-white max-w-sm">
              <div class="bg-brandBlue text-white p-5 font-black uppercase flex justify-between items-center border-b-[6px] border-black">
                <span class="text-2xl tracking-widest">TAMİR AI</span>
                <button onClick=${() => setIsChatOpen(false)} class="text-3xl hover:scale-125 transition-transform leading-none">×</button>
              </div>
              <div class="flex-grow p-5 overflow-y-auto space-y-5 bg-[#fcf7f5] hide-scrollbar">
                ${messages.map(m => html`
                  <div class="p-4 border-[4px] border-black font-bold text-lg ${m.role === 'bot' ? 'bg-brandLime' : 'bg-white shadow-[4px_4px_0px_#000] ml-6'}">
                    ${m.text}
                  </div>
                `)}
              </div>
              <div class="p-4 border-t-[6px] border-black flex gap-3 bg-white">
                <input value=${input} onInput=${e => setInput(e.target.value)} onKeyPress=${e => e.key === 'Enter' && handleSend()} class="flex-grow p-3 border-[4px] border-black outline-none font-bold bg-[#fcf7f5]" placeholder="Buraya yaz..." />
                <button onClick=${handleSend} class="bg-black text-brandLime px-6 border-[4px] border-black font-black text-xl hover:bg-brandBlue hover:text-white transition-colors">SOR</button>
              </div>
            </div>
          `}
          <button onClick=${() => setIsChatOpen(!isChatOpen)} class="bg-brandBlue text-brandLime w-20 h-20 md:w-24 md:h-24 brutal-card flex items-center justify-center hover:scale-110 transition-transform text-4xl md:text-5xl font-black shadow-[10px_10px_0px_#000] ml-auto rounded-none">
            ?
          </button>
        </div>
      `;
    }

    function Map() {
      const mapRef = useRef(null);
      const [layers, setLayers] = useState({
        tamirciler: { active: true, title: 'TAMİRCİLER', sub: 'Terzi / Elektronik', color: 'bg-brandLime', shape: 'square' },
        kamu: { active: true, title: 'KAMU BİNALARI', sub: 'İSMEK / Kütüphane', color: 'bg-brandLavender', shape: 'square' },
        buffers: { active: true, title: '400M ETKİ ALANI', sub: 'Yürüme Mesafesi', color: 'bg-brandLime/40', shape: 'dotted' }
      });
      const groupsRef = useRef(null);
      const mapInstance = useRef(null);

      useEffect(() => {
        if (!mapRef.current || mapInstance.current) return;
        const map = window.L.map(mapRef.current).setView([40.988, 29.045], 14);
        window.L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        mapInstance.current = map;
        groupsRef.current = { tamirciler: window.L.layerGroup(), kamu: window.L.layerGroup(), buffers: window.L.layerGroup() };

        fetch('./kadikoy_map_data.json').then(res => res.json()).then(data => {
          const icon = (bg) => window.L.divIcon({ className: '', html: `<div class="w-8 h-8 border-[4px] border-black shadow-[4px_4px_0px_#000] ${bg}"></div>`, iconSize: [32, 32] });
          if (data.tamirciler) {
            Object.values(data.tamirciler).forEach(cat => cat.forEach(m => {
              window.L.marker([m.lat, m.lon], { icon: icon('bg-brandLime') }).bindPopup(`<b class="font-bold text-lg">${m.name}</b>`).addTo(groupsRef.current.tamirciler);
              window.L.circle([m.lat, m.lon], { radius: 400, color: '#000', weight: 3, fillColor: '#dcfc75', fillOpacity: 0.15, dashArray: '6, 12' }).addTo(groupsRef.current.buffers);
            }));
          }
          data.kamu?.forEach(m => window.L.marker([m.lat, m.lon], { icon: icon('bg-brandLavender') }).bindPopup(`<b class="font-bold text-lg">${m.name}</b>`).addTo(groupsRef.current.kamu));
          Object.keys(layers).forEach(k => { if (layers[k].active) groupsRef.current[k].addTo(map); });
        });
      }, []);

      useEffect(() => {
        if (!mapInstance.current || !groupsRef.current) return;
        Object.keys(layers).forEach(k => { if (layers[k].active) mapInstance.current.addLayer(groupsRef.current[k]); else mapInstance.current.removeLayer(groupsRef.current[k]); });
      }, [layers]);

      return html`
        <div class="flex flex-col lg:flex-row gap-12 relative z-10">
          <div class="w-full lg:w-[500px] brutal-card p-8 md:p-12 space-y-12 bg-white/95 backdrop-blur-md">
            <h3 class="text-5xl md:text-7xl font-black uppercase tracking-tighter border-b-[8px] border-black pb-6 text-brandBlue">KATMANLAR</h3>
            <div class="space-y-10">
              ${Object.entries(layers).map(([key, l]) => html`
                <div class="flex items-start gap-6 cursor-pointer" onClick=${() => setLayers(p => ({ ...p, [key]: { ...l, active: !l.active } }))}>
                  <div class="map-checkbox mt-1">${l.active && html`<div class="w-5 h-5 bg-brandBlue" style="clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%)"></div>`}</div>
                  <div class="w-12 h-12 border-[5px] border-black shrink-0 shadow-[4px_4px_0px_#000] ${l.color} ${l.shape === 'dotted' ? 'border-dashed' : ''}"></div>
                  <div class="flex flex-col"><span class="text-3xl md:text-4xl font-black uppercase leading-none text-black">${l.title}</span><span class="text-xl font-bold text-gray-500 uppercase mt-2">${l.sub}</span></div>
                </div>
              `)}
            </div>
          </div>
          <div ref=${mapRef} class="w-full h-[600px] md:h-[800px] brutal-card bg-white"></div>
        </div>
      `;
    }

    function App() {
      const [view, setView] = useState('merkezler');
      const [puan, setPuan] = useState(250);
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [messages, setMessages] = useState([{ role: 'bot', text: 'Merhaba bugün neyi tamir ediyoruz! :)' }]);
      const [chatInput, setChatInput] = useState('');
      const [matchCategory, setMatchCategory] = useState('');
      const [matchDesc, setMatchDesc] = useState('');

      useEffect(() => { if (view === 'panel') { setTimeout(() => { const canvas = document.getElementById('user-qr-code'); if (canvas) window.QRCode.toCanvas(canvas, "TAMIR-2026-ILGIN", { width: 220, margin: 2, color: { dark: '#000000', light: '#ffffff' } }); }, 100); } }, [view]);

      const handleSend = async (customMsg = null) => {
        const msgToSend = customMsg || chatInput;
        if (!msgToSend.trim()) return;
        const currentHistory = [...messages];
        setMessages(prev => [...prev, { role: 'user', text: msgToSend }]);
        if(!customMsg) setChatInput('');
        try {
          const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msgToSend, history: currentHistory.map(m => ({ role: m.role === 'bot' ? 'assistant' : 'user', text: m.text })) }) });
          const data = await res.json();
          setMessages(prev => [...prev, { role: 'bot', text: data.reply }]);
        } catch (e) { setMessages(prev => [...prev, { role: 'bot', text: "Bağlantı koptu!" }]); }
      };

      const triggerMatch = () => {
        if(!matchCategory || !matchDesc) { alert("Lütfen kategori seç ve sorunu yaz!"); return; }
        setIsChatOpen(true); handleSend(`Kategori: ${matchCategory}. Sorun: ${matchDesc}`);
        setMatchDesc(''); setMatchCategory('');
      };

      return html`
        <div class="max-w-[1400px] mx-auto space-y-12 md:space-y-16 relative z-10 py-10">
          <header class="flex flex-col gap-10 border-b-[10px] border-black pb-10">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center w-full gap-10">
              <h1 class="text-[5rem] md:text-[8rem] lg:text-[10rem] font-black tracking-tighter uppercase leading-[0.85] text-black">
                TAMİR<br/><span class="text-brandBlue">&</span> ÖDÜL
              </h1>
              <div class="bg-brandLime border-[6px] border-black shadow-[12px_12px_0px_0px_#000] p-6 md:p-10 transform -rotate-2 w-full lg:max-w-lg">
                <p class="text-4xl md:text-5xl font-black uppercase text-black leading-tight text-center">TAMİRİ YAP<br/>İNDİRİMİ KAP!</p>
              </div>
            </div>
            
            <nav class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
              <button onClick=${() => setView('panel')} class="flex flex-col items-center justify-center gap-3 p-6 brutal-btn font-black text-2xl md:text-3xl ${view === 'panel' ? 'bg-black text-brandLime' : 'bg-white'}"><${IconHome}/> PANEL</button>
              <button onClick=${() => setView('ustalar')} class="flex flex-col items-center justify-center gap-3 p-6 brutal-btn font-black text-2xl md:text-3xl ${view === 'ustalar' ? 'bg-black text-brandLime' : 'bg-brandLavender'}"><${IconSearch}/> USTA BUL</button>
              <button onClick=${() => setView('kampanyalar')} class="flex flex-col items-center justify-center gap-3 p-6 brutal-btn font-black text-2xl md:text-3xl ${view === 'kampanyalar' ? 'bg-black text-brandLime' : 'bg-white'}"><${IconGift}/> ÖDÜLLER</button>
              <button onClick=${() => setView('merkezler')} class="flex flex-col items-center justify-center gap-3 p-6 brutal-btn font-black text-2xl md:text-3xl ${view === 'merkezler' ? 'bg-black text-brandLime' : 'bg-brandBlue text-white'}"><${IconMap}/> HARİTA</button>
            </nav>
          </header>

          <main>
            ${view === 'merkezler' && html`<${Map} />`}
            
            ${view === 'ustalar' && html`
              <div class="max-w-5xl mx-auto brutal-card p-10 md:p-16 bg-white">
                <div class="bg-black text-brandLime inline-block px-6 py-3 mb-10 border-[5px] border-black transform -rotate-1">
                  <h2 class="text-4xl md:text-6xl font-black uppercase tracking-widest">USTANLA EŞLEŞ</h2>
                </div>
                <div class="space-y-12">
                  <div>
                    <h3 class="text-3xl font-black uppercase mb-6 text-brandBlue">1. KATEGORİ SEÇ</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                      ${['Elektronik', 'Mobilya', 'Tekstil', 'Ayakkabi'].map(c => html`
                        <button onClick=${() => setMatchCategory(c)} class="border-[5px] border-black p-5 font-black text-xl uppercase transition-transform ${matchCategory === c ? 'bg-brandBlue text-white shadow-[6px_6px_0px_#000] -translate-y-2' : 'bg-[#fcf7f5] hover:bg-brandLavender'}">${c}</button>
                      `)}
                    </div>
                  </div>
                  <div>
                    <h3 class="text-3xl font-black uppercase mb-6 text-brandBlue">2. SORUNU ANLAT</h3>
                    <textarea value=${matchDesc} onInput=${e => setMatchDesc(e.target.value)} class="w-full border-[6px] border-black p-6 font-bold text-2xl h-40 bg-[#fcf7f5] outline-none focus:bg-brandLime transition-colors" placeholder="Cihazının nesi var?"></textarea>
                  </div>
                  <button onClick=${triggerMatch} class="w-full bg-brandLime text-black border-[6px] border-black p-6 font-black text-4xl uppercase hover:bg-black hover:text-brandLime transition-colors shadow-[8px_8px_0px_#000]">EN İYİ USTAYI BUL</button>
                </div>
              </div>
            `}
            
            ${view === 'panel' && html`
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 mt-12">
                <div class="brutal-card p-12 bg-brandBlue text-white flex flex-col justify-center items-center transform rotate-1">
                  <h2 class="text-5xl md:text-6xl font-black mb-4 uppercase tracking-widest text-brandLime border-b-8 border-brandLime pb-2">PUANIN</h2>
                  <div class="text-[10rem] md:text-[12rem] font-black leading-none drop-shadow-[8px_8px_0px_#000]">${puan}</div>
                </div>
                <div class="brutal-card p-12 bg-brandLime flex flex-col items-center justify-center transform -rotate-1">
                  <div class="bg-white p-4 border-[6px] border-black shadow-[8px_8px_0px_#000] mb-8">
                     <canvas id="user-qr-code"></canvas>
                  </div>
                  <p class="text-3xl font-black uppercase bg-black text-white px-8 py-4 shadow-[6px_6px_0px_#000]">TAMIR-2026-ILGIN</p>
                </div>
              </div>
            `}
            
            ${view === 'kampanyalar' && html`
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <div class="brutal-card p-8 bg-brandLavender flex flex-col">
                  <h3 class="text-3xl font-black uppercase leading-tight mb-6">SİNEMA BİLETİ</h3>
                  <div class="bg-white border-[4px] border-black p-6 flex-grow flex items-center justify-center text-center font-bold text-xl mb-6">Kadıköy Sineması'nda ücretsiz seans!</div>
                  <button class="w-full bg-black text-brandLime border-[5px] border-black font-black text-2xl p-4 hover:bg-brandBlue hover:text-white transition-colors">300 PUAN</button>
                </div>
                <div class="brutal-card p-8 bg-brandBlue text-white flex flex-col transform scale-105 shadow-[12px_12px_0px_#000] z-10">
                  <h3 class="text-3xl font-black uppercase leading-tight mb-6 text-brandLime">KONSER BİLETİ</h3>
                  <div class="bg-black border-[4px] border-brandLime p-6 flex-grow flex items-center justify-center text-center font-bold text-xl mb-6">Kadıköy Sahne'de %50 İndirim!</div>
                  <button class="w-full bg-brandLime text-black border-[5px] border-black font-black text-2xl p-4 hover:bg-white transition-colors">200 PUAN</button>
                </div>
                <div class="brutal-card p-8 bg-brandLime flex flex-col">
                  <h3 class="text-3xl font-black uppercase leading-tight mb-6">TAMİR SETİ</h3>
                  <div class="bg-white border-[4px] border-black p-6 flex-grow flex items-center justify-center text-center font-bold text-xl mb-6">Dükkan Kadıköy'den başlangıç kiti.</div>
                  <button class="w-full bg-black text-brandLime border-[5px] border-black font-black text-2xl p-4 hover:bg-brandLavender hover:text-black transition-colors">150 PUAN</button>
                </div>
              </div>
            `}
          </main>
          
          <${ChatBot} isChatOpen=${isChatOpen} setIsChatOpen=${setIsChatOpen} messages=${messages} input=${chatInput} setInput=${setChatInput} handleSend=${handleSend} />
        </div>
      `;
    }
    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
